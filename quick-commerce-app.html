function LiveTimer({ minutes = 8, compact, bright }) {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => { const t = setInterval(() => setElapsed((e) => e + 1), 1000); return () => clearInterval(t); }, []);
  const totalSec = minutes * 60 - elapsed;
  const m = Math.max(0, Math.floor(totalSec / 60));
  const s = Math.max(0, totalSec % 60);
  if (compact) return (
    <span style={{ fontVariantNumeric: "tabular-nums", color: bright ? "#FFD700" : "#1F8C3B", fontWeight: 800 }}>
      {m}:{s.toString().padStart(2, "0")}
    </span>
  );
  return (
    <div style={{ display: "flex", alignItems: "baseline", gap: 3, fontVariantNumeric: "tabular-nums" }}>
      <span style={{ fontSize: 28, fontWeight: 900, color: bright ? "#FFD700" : "#1F8C3B", lineHeight: 1 }}>
        {m}:{s.toString().padStart(2, "0")}
      </span>
      <span style={{ fontSize: 11, fontWeight: 700, color: bright ? "rgba(255,215,0,0.7)" : "#6BBF7B", marginLeft: 2 }}>mins left</span>
    </div>
  );
}

function SpeedPulse({ size = 64, children }) {
  return (
    <div style={{ position: "relative", width: size, height: size, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ position: "absolute", inset: 0, borderRadius: "50%", border: "2px solid #1F8C3B", opacity: 0.4, animation: "speedPulse 2s ease-out infinite" }} />
      <div style={{ position: "absolute", inset: -6, borderRadius: "50%", border: "1.5px solid #1F8C3B", opacity: 0.2, animation: "speedPulse 2s ease-out 0.4s infinite" }} />
      {children}
    </div>
  );
}

function Confetti() {
  const colors = ["#FFD700", "#1F8C3B", "#FF6B35", "#E8475F", "#4A90D9", "#9B59B6"];
  const pieces = Array.from({ length: 50 }, (_, i) => ({
    id: i, left: Math.random() * 100, delay: Math.random() * 0.8,
    duration: 1.2 + Math.random() * 1, color: colors[i % colors.length],
    rotation: Math.random() * 360, size: 6 + Math.random() * 8,
    shape: Math.random() > 0.5 ? "circle" : "rect",
  }));
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none", zIndex: 10 }}>
      {pieces.map((p) => (
        <div key={p.id} style={{
          position: "absolute", left: `${p.left}%`, top: "-10%",
          width: p.shape === "circle" ? p.size : p.size * 0.6, height: p.size,
          backgroundColor: p.color, borderRadius: p.shape === "circle" ? "50%" : "2px",
          transform: `rotate(${p.rotation}deg)`,
          animation: `confettiFall ${p.duration}s ${p.delay}s ease-in forwards`, opacity: 0,
        }} />
      ))}
    </div>
  );
}

function SpeedBadge({ mins, isStore }) {
  if (isStore) return (
    <div style={{
      position: "absolute", top: 6, left: 6, borderRadius: 6,
      padding: "2px 7px", fontSize: 9, fontWeight: 800, letterSpacing: 0.3,
      display: "flex", alignItems: "center", gap: 3,
      background: "linear-gradient(135deg, #455A64, #607D8B)", color: "#fff",
    }}>
      <span style={{ fontSize: 8 }}>🏪</span>{mins} MIN
    </div>
  );
  return (
    <div style={{
      position: "absolute", top: 6, left: 6, borderRadius: 6,
      padding: "2px 7px", fontSize: 9, fontWeight: 800, letterSpacing: 0.3,
      display: "flex", alignItems: "center", gap: 3,
      background: "linear-gradient(135deg, #0B3D1F, #1F8C3B)", color: "#FFD700",
      boxShadow: "0 1px 4px rgba(31,140,59,0.3)",
    }}>
      <span style={{ fontSize: 8 }}>⚡</span>{mins} MIN
    </div>
  );
}

function QuickCommerceApp() {

  const [activeCategory, setActiveCategory] = useState("all");
  const [showConfetti, setShowConfetti] = useState(false);
  const [animatingItems, setAnimatingItems] = useState({});
  const [activeStore, setActiveStore] = useState(null);

  // Build a unified product lookup: flash + all store products
  const allProducts = [...PRODUCTS, ...STORES.flatMap((s) => s.products.map((p) => ({ ...p, source: s.id, storeName: s.name, storeEta: s.eta })))];
  const findProduct = (id) => allProducts.find((p) => p.id === Number(id));

  const cartItems = Object.entries(cart).filter(([, q]) => q > 0).map(([id, qty]) => {
    const p = findProduct(id);
    return p ? { ...p, qty } : null;
  }).filter(Boolean);

  const flashItems = cartItems.filter((i) => i.source === "flash");
  const storeItems = cartItems.filter((i) => i.source !== "flash");
  // Group store items by store
  const storeGroups = {};
  storeItems.forEach((item) => {
    if (!storeGroups[item.source]) {
      const store = STORES.find((s) => s.id === item.source);
      storeGroups[item.source] = { store, items: [] };
    }
    storeGroups[item.source].items.push(item);
  });

  const cartCount = cartItems.reduce((s, i) => s + i.qty, 0);
  const cartTotal = cartItems.reduce((s, i) => s + i.price * i.qty, 0);

  const addToCart = (id) => {
    setAnimatingItems((p) => ({ ...p, [id]: true }));
    setTimeout(() => setAnimatingItems((p) => ({ ...p, [id]: false })), 300);
    setCart((p) => ({ ...p, [id]: (p[id] || 0) + 1 }));
  };
  const removeFromCart = (id) => setCart((p) => ({ ...p, [id]: Math.max((p[id] || 0) - 1, 0) }));

  const filteredProducts = PRODUCTS.filter((p) => {
    const matchCat = activeCategory === "all" || p.category === activeCategory;
    const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });

  const placeOrder = () => { setScreen("placed"); setShowConfetti(true); setTimeout(() => setShowConfetti(false), 3000); };
  const resetOrder = () => { setCart({}); setScreen("home"); };

  const openStore = (store) => { setActiveStore(store); setScreen("store"); };

          <LiveTimer minutes={8} bright />
          <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 6, justifyContent: "center" }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#FFD700", animation: "blink 1s ease-in-out infinite" }} />
            <span style={{ fontSize: 11, color: "#A8D5BA", fontWeight: 600 }}>Rider is picking up your order</span>
          </div>
        </div>
        <div style={{ marginTop: 16, fontSize: 12, color: "#888", display: "flex", alignItems: "center", gap: 6 }}>📍 Delivering to <strong style={{ color: "#333" }}>{USER_ADDRESS.full}</strong></div>
      </div>
      <div style={{ padding: "12px 16px 28px", flexShrink: 0 }}>
        <button onClick={resetOrder} style={{ width: "100%", background: "#fff", color: "#1A1A1A", border: "2px solid #E0E0E0", borderRadius: 14, padding: "14px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Continue shopping</button>
      </div>
    </Phone>
  );

  // ═══════════════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════════════
  const screens = {
    onboard1: Onboard1, onboard2: Onboard2, onboard3: Onboard3,
    home: HomeScreen, store: StoreScreen, cart: CartScreen,
    address: AddressScreen, checkout: CheckoutScreen, placed: OrderPlacedScreen,
  };
  const CurrentScreen = screens[screen];

  const navItems = [
    { id: "onboard1", label: "⚡ Welcome" }, { id: "onboard2", label: "🕐 Timeline" },
    { id: "onboard3", label: "📍 Location" }, { id: "home", label: "🏠 Home" },
    { id: "store", label: "🏪 Store" }, { id: "cart", label: "🛒 Cart" },
    { id: "address", label: "📍 Address" }, { id: "checkout", label: "💳 Checkout" },
    { id: "placed", label: "✅ Placed" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(145deg, #F0F4F8, #E2E8F0)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 16px", fontFamily: "'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
      <style>{`
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(700px) rotate(720deg); } }
        @keyframes pinBounce { 0%, 100% { transform: translate(-50%, -100%); } 50% { transform: translate(-50%, -110%); } }
        @keyframes speedPulse { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.6); opacity: 0; } }
        @keyframes speedLine { 0% { transform: translateX(-100%); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(300%); opacity: 0; } }
        @keyframes radarPing { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes flashBadge { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes countPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes rocketBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        input::placeholder { color: #aaa; }
      `}</style>

      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 4, color: "#1F8C3B", textTransform: "uppercase", marginBottom: 6, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>⚡</span> FLASH DELIVERY
        </div>
        <h1 style={{ fontSize: 28, fontWeight: 800, color: "#1A1A1A", margin: 0, letterSpacing: -0.5 }}>Quick Commerce Prototype</h1>
        <p style={{ fontSize: 13, color: "#888", margin: "6px 0 0" }}>Onboarding → Shop → Stores → Cart → Checkout → Delivered</p>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap", justifyContent: "center" }}>
        {navItems.map((s) => (
          <button key={s.id} onClick={() => { if (s.id === "store" && !activeStore) { setActiveStore(STORES[0]); } setScreen(s.id); }} style={{
            padding: "6px 12px", borderRadius: 20, border: "none",
            background: screen === s.id ? "#1F8C3B" : "#fff",
            color: screen === s.id ? "#fff" : "#555",
            fontSize: 11, fontWeight: 600, cursor: "pointer",
            boxShadow: "0 1px 4px rgba(0,0,0,0.08)", transition: "all 0.2s",
          }}>{s.label}</button>
        ))}
      </div>

      <CurrentScreen />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<QuickCommerceApp />);
</script>
</body>
</html>
